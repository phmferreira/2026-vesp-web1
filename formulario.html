<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Exemplo de formulário</title>
</head>
<body>
    <form>
        <div>
            <input type="text" placeholder="Nome Completo">
            <input type="submit">
        </div>
        <hr>
        Formulário de envio do tipo text e senha
        <div>
            <input name="login" type="text" placeholder="digite seu login">
            <input name="senha" type="password" placeholder="digite sua senha">
        </div>
        <hr>
        Formulário de envio do tipo email e senha
        <div>
            <label for="email">email</label>
            <input id="email" name="email" type="email" placeholder="digite seu email">
            <label for="senha">senha</label>
            <input id="senha" name="senha" type="password" placeholder="digite sua senha">
        </div>
        <hr>
        Formulário de envio do tipo data
        <div>
            <label> Data de nascimento:
                <input name="data" type="date">
            </label>
        </div>
        <hr>
        Formulário de envio do tipo select
        <div>
            <select name="cidade">
                <option value="Itaporanga">Itaporanga</option>
                <option value="Boa Ventura">Boa Ventura</option>
                <option value="Outra">Outra</option>
            </select>
        </div>
        <hr>
        Formulário de envio do tipo datalist
        <div>
            <input name="cidade1" list="lista_cidades" placeholder="Cidade atual">
            <datalist id="lista_cidades">
                <option value="Itaporanga">
                <option value="Boa Ventura">
                <option value="Diamante">
            </datalist>
        </div>
    </form>
            
</body>
</html>
