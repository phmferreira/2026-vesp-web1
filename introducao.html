<!-- versão do html estamos usando -->
<!DOCTYPE html>
<!-- elementos aninhados -->
<html lang="pt"> <!-- ex.: atributo do elemento -->
<!-- cada elemento tem sua tag -->
<!-- o elemento html tem obrigatoriamente dos elementos dentro -->
<!-- o head (cabeçalho) e o body (corpo) -->
<head>
    <!-- cabeçalho -->
    <!-- informações da página útil para o navegador -->
    <title>Olá!</title> 
</head>
<body>
    <!-- corpo -->
    Olá, mundo!
    <p>Primeira página.</p>
</body>
</html>
